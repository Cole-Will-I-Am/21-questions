name: Echo
options:
  bundleIdPrefix: com.colecantcode
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: true
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: B3DB33R8JN

targets:
  Echo:
    type: application
    platform: iOS
    sources:
      - Echo/Sources
      - Echo/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colecantcode.echo
        INFOPLIST_KEY_CFBundleDisplayName: Echo
        INFOPLIST_KEY_CFBundleName: Echo
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        PRODUCT_NAME: Echo
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_MODULE_NAME: Echo
        CODE_SIGN_IDENTITY: "Apple Development"
